<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moreway Planet Explorer</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div id="app">
      <!-- 1. Background Scene Layer -->
      <main id="scene-root"></main>

      <!-- 2. Visual FX Layer (Frosted Glass) -->
      <div id="frosted-mask"></div>

      <!-- 3. HUD / Sidebar Layer -->
      <aside class="hud">
        <h1>Moreway Planet Explorer</h1>
        <p>围绕球壳探索 LanceDB 文档。</p>
        <div id="status">正在加载...</div>
        <div id="results-summary" class="results-summary">正在计算视野焦点…</div>
        <div id="results-list" class="results-list"></div>
      </aside>

      <!-- 4. Interactive Overlay (Labels) -->
      <div id="overlay-layer"></div>

      <!-- 5. Focus Frame & Stats -->
      <div id="focus-region-box" class="focus-region-box">
        <div id="rotation-display">Lat: 0° Lon: 0°</div>
      </div>
    </div>
  </body>
</html>
