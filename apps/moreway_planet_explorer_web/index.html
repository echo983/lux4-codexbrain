<!doctype html>

  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moreway Planet Explorer</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div id="app">
      <aside class="hud">
        <h1>Moreway Planet Explorer</h1>
        <p>围绕球壳探索 LanceDB 文档。</p>
        <div id="status">正在加载...</div>
        <div id="results-summary" class="results-summary">正在计算视野焦点…</div>

      </aside>
      <div id="overlay-layer"></div>
      <div id="focus-region-box" class="focus-region-box"></div>
      <div id="rotation-display" style="position: absolute; bottom: 10px; right: 10px; color: #fff; font-family: monospace; background: rgba(0,0,0,0.5); padding: 5px; z-index: 1000;">Lat: 0° Lon: 0°</div>
      <main id="scene-root"></main>
