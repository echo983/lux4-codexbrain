<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moreway Planet Explorer</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div id="app">
      <aside class="hud">
        <h1>Moreway Planet Explorer</h1>
        <p>围绕球壳探索 LanceDB 文档。</p>
        <div id="status">正在加载...</div>
        <div id="results-summary" class="results-summary">正在计算视野焦点…</div>
        <div id="results-list" class="results-list"></div>
      </aside>
      <div class="topbar">
        <label class="topbar-select-wrap">
          <span>地表贴图</span>
          <select id="planet-texture-mode" class="topbar-select">
            <option value="surface_map">原始贴图</option>
            <option value="openai_materials">OpenAI 材质</option>
            <option value="planet_shader" selected>着色器材质</option>
          </select>
        </label>
        <button id="focus-region-toggle" class="topbar-button" type="button">隐藏视觉中心框</button>
      </div>
      <div id="overlay-layer"></div>
      <div id="focus-region-box" class="focus-region-box"></div>
      <main id="scene-root"></main>
    </div>
  </body>
</html>
